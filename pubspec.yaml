name: xaut
description: XAUT - Ultra-reliable live XAUUSD gold price tracker with advanced alerts

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5

  # Networking
  http: ^1.2.0
  connectivity_plus: ^6.0.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications & Alarms
  flutter_local_notifications: ^17.2.2
  permission_handler: ^11.3.1

  # Background Services
  workmanager: ^0.5.2

  # UI & Charts
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

  # Home Screen Widget
  shared_preferences: ^2.3.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  logger: ^2.3.0
  get_it: ^7.7.0
  rxdart: ^0.27.7
  timezone: ^0.9.4
  flutter_timezone: ^2.0.0
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # Fonts served via google_fonts package (no local font assets needed)

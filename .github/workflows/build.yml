name: XAUT - Flutter CI/CD

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Flutter Analyze
  # ─────────────────────────────────────────────
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test || echo "No tests found"

  # ─────────────────────────────────────────────
  # JOB 2: Build Release APK
  # ─────────────────────────────────────────────
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Ensure Asset Directories
        run: mkdir -p assets/images assets/fonts

      - name: Generate Placeholder Icons
        run: python3 scripts/gen_icons.py

      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi

      - name: Build Universal APK
        run: |
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/xaut-universal-release.apk

      - name: Show APK sizes
        run: find build/app/outputs/flutter-apk -name "*.apk" -exec ls -lh {} \;

      - name: Get version
        id: ver
        run: |
          V=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          echo "version=$V" >> $GITHUB_OUTPUT

      - name: Upload arm64-v8a
        uses: actions/upload-artifact@v4
        with:
          name: xaut-arm64-v8a-${{ steps.ver.outputs.version }}
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload armeabi-v7a
        uses: actions/upload-artifact@v4
        with:
          name: xaut-armeabi-v7a-${{ steps.ver.outputs.version }}
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload x86_64
        uses: actions/upload-artifact@v4
        with:
          name: xaut-x86_64-${{ steps.ver.outputs.version }}
          path: build/app/outputs/flutter-apk/app-x86_64-release.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Universal
        uses: actions/upload-artifact@v4
        with:
          name: xaut-universal-${{ steps.ver.outputs.version }}
          path: build/app/outputs/flutter-apk/xaut-universal-release.apk
          if-no-files-found: warn
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 3: GitHub Release on tag push
  # ─────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: XAUT v${{ steps.ver.outputs.version }}
          draft: false
          prerelease: false
          body: |
            ## XAUT Gold Price Tracker v${{ steps.ver.outputs.version }}

            Live XAUUSD gold price tracking with advanced price alerts.

            **Download:** Choose the APK matching your device:
            - `arm64-v8a` — Modern Android phones (recommended)
            - `armeabi-v7a` — Older Android phones
            - `x86_64` — Emulators
            - `universal` — All architectures

            **Requires:** Android 7.0+ (API 24), internet connection
          files: artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # JOB 4: Debug APK for PRs
  # ─────────────────────────────────────────────
  build-debug:
    name: Build Debug APK (PR)
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Ensure Asset Directories
        run: mkdir -p assets/images assets/fonts

      - name: Generate Placeholder Icons
        run: python3 scripts/gen_icons.py

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: xaut-debug-pr-${{ github.event.number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
